<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Factura | HYPERTECH SOLUTIONS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--blue:#1565C0;--blue-dark:#0D47A1;--orange:#F57C00;--yellow:#F9A825;--black:#1A1A1A;--gray:#F5F5F5;--border:#E0E0E0}
    body{font-family:'Rajdhani',sans-serif;background:#F0F4F8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
    .verify-header{background:var(--blue-dark);color:white;width:100%;max-width:700px;border-radius:10px 10px 0 0;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
    .verify-logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px}
    .verify-logo span{color:var(--orange)}
    .verify-badge{background:var(--orange);color:white;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:1px}
    .verify-body{background:white;width:100%;max-width:700px;border:1px solid var(--border);padding:32px;border-radius:0 0 10px 10px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .verify-title{font-size:13px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid var(--yellow)}
    .status-bar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:8px;margin-bottom:24px}
    .status-bar.valid{background:#E8F5E9;border:1.5px solid #A5D6A7}
    .status-bar.invalid{background:#FFEBEE;border:1.5px solid #FFCDD2}
    .status-bar.pending{background:#FFF8E1;border:1.5px solid #FFE082}
    .status-icon{font-size:28px;line-height:1}
    .status-text-main{font-size:16px;font-weight:700}
    .status-valid .status-text-main{color:#2E7D32}
    .status-invalid .status-text-main{color:#C62828}
    .status-pending .status-text-main{color:#F57F17}
    .status-text-sub{font-size:12px;color:#666;margin-top:2px}
    .inv-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .detail-block{background:var(--gray);border-radius:8px;padding:14px 16px}
    .detail-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .detail-value{font-size:15px;font-weight:700;color:var(--black)}
    .detail-value.big{font-size:22px;color:var(--blue-dark)}
    .items-section{margin-bottom:20px}
    .items-table{width:100%;border-collapse:collapse;font-size:13px}
    .items-table th{background:var(--blue-dark);color:white;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase}
    .items-table td{padding:8px 12px;border-bottom:1px solid #eee}
    .totals-block{display:flex;justify-content:flex-end;margin-bottom:24px}
    .totals-inner{width:260px;background:var(--gray);border-radius:8px;padding:14px 18px}
    .t-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
    .t-row.grand{font-size:17px;font-weight:700;color:var(--blue-dark);border-top:2px solid var(--border);padding-top:8px;margin-top:4px}
    .dgii-section{background:#E3F2FD;border:1.5px solid #90CAF9;border-radius:8px;padding:16px 18px;margin-bottom:20px}
    .dgii-title{font-size:12px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .dgii-row{display:flex;gap:8px;font-size:13px;padding:3px 0}
    .dgii-key{font-weight:600;color:#444;min-width:160px}
    .dgii-val{color:var(--black)}
    .verify-footer{text-align:center;margin-top:24px;font-size:12px;color:#888;line-height:1.6}
    .verify-footer strong{color:var(--blue-dark)}
    .not-found{text-align:center;padding:40px 20px;color:#888}
    .not-found .nf-icon{font-size:52px;margin-bottom:12px}
    .not-found h2{font-size:20px;color:var(--black);margin-bottom:8px}
    .qr-block{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
    .qr-label{font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
    @media(max-width:600px){.inv-detail-grid{grid-template-columns:1fr}.items-table th:nth-child(3),.items-table td:nth-child(3){display:none}}
  </style>
</head>
<body>

  <div class="verify-header">
    <div class="verify-logo">HYPER<span>TECH</span> SOLUTIONS</div>
    <div class="verify-badge">VERIFICACIÓN DGII</div>
  </div>

  <div class="verify-body">
    <div class="verify-title">&#9679; Portal de Verificación de Documentos Fiscales</div>
    <div id="verify-content">
      <div class="not-found">
        <div class="nf-icon">&#128269;</div>
        <h2>Verificando documento...</h2>
        <p>Cargando información de la factura.</p>
      </div>
    </div>
    <div class="verify-footer">
      Documento emitido por <strong>HYPERTECH SOLUTIONS</strong><br>
      Verificación compatible con DGII &mdash; Dirección General de Impuestos Internos<br>
      República Dominicana &mdash; <span id="verify-timestamp"></span>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  document.getElementById('verify-timestamp').textContent = new Date().toLocaleString('es-DO');

  function getParam(name){
    const url = new URLSearchParams(window.location.search);
    return url.get(name);
  }

  function statusInfo(s){
    const map={
      paid:{cls:'valid',icon:'✅',main:'FACTURA VÁLIDA - PAGADA',sub:'Documento fiscal verificado y pagado'},
      pending:{cls:'pending',icon:'⏳',main:'FACTURA PENDIENTE DE PAGO',sub:'Documento fiscal emitido, pago en proceso'},
      cancelled:{cls:'invalid',icon:'❌',main:'FACTURA ANULADA',sub:'Este documento ha sido anulado'},
      quote:{cls:'pending',icon:'📋',main:'COTIZACIÓN',sub:'Este documento es una cotización, no una factura fiscal'}
    };
    return map[s]||{cls:'pending',icon:'⚠️',main:'ESTADO DESCONOCIDO',sub:''};
  }

  function fmtDate(d){
    if(!d)return'-';
    const p=d.split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  }

  function buildVerifyHTML(inv){
    const s = statusInfo(inv.status);
    const cur = 'RD$';
    const ncf = inv.ncf || 'B02-'+inv.number;
    const items = inv.items || [];

    let html = `
    <div class="status-bar ${s.cls}" style="margin-bottom:20px">
      <div class="status-icon">${s.icon}</div>
      <div>
        <div class="status-text-main" style="color:${s.cls==='valid'?'#2E7D32':s.cls==='invalid'?'#C62828':'#F57F17'}">${s.main}</div>
        <div class="status-text-sub">${s.sub}</div>
      </div>
    </div>

    <div class="dgii-section">
      <div class="dgii-title">&#9632; Datos Fiscales DGII</div>
      <div class="dgii-row"><span class="dgii-key">Número de Comprobante (NCF):</span><span class="dgii-val" style="font-weight:700;color:#1565C0">${ncf}</span></div>
      <div class="dgii-row"><span class="dgii-key">Tipo de Comprobante:</span><span class="dgii-val">${inv.ncfType||'Factura con Valor Fiscal'}</span></div>
      <div class="dgii-row"><span class="dgii-key">RNC Emisor:</span><span class="dgii-val">${inv.companyRnc||'No especificado'}</span></div>
      <div class="dgii-row"><span class="dgii-key">Nombre Emisor:</span><span class="dgii-val">HYPERTECH SOLUTIONS</span></div>
      <div class="dgii-row"><span class="dgii-key">RNC/Cédula Receptor:</span><span class="dgii-val">${inv.clientRnc||'Consumidor Final'}</span></div>
      <div class="dgii-row"><span class="dgii-key">Nombre Receptor:</span><span class="dgii-val">${inv.clientName}</span></div>
      <div class="dgii-row"><span class="dgii-key">Fecha de Emisión:</span><span class="dgii-val">${fmtDate(inv.date)}</span></div>
      <div class="dgii-row"><span class="dgii-key">Fecha de Vencimiento:</span><span class="dgii-val">${fmtDate(inv.dueDate)||'-'}</span></div>
    </div>

    <div class="inv-detail-grid">
      <div class="detail-block">
        <div class="detail-label">Número de Factura</div>
        <div class="detail-value big">${inv.number}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Total a Pagar</div>
        <div class="detail-value big">${cur}${(inv.total||0).toFixed(2)}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Cliente</div>
        <div class="detail-value">${inv.clientName}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Correo del Cliente</div>
        <div class="detail-value">${inv.clientEmail||'-'}</div>
      </div>
    </div>

    <div class="items-section">
      <table class="items-table">
        <thead><tr><th>Descripción</th><th>Cant.</th><th>Precio</th><th>ITBIS</th><th>Total</th></tr></thead>
        <tbody>
          ${items.map(it=>`<tr>
            <td>${it.desc||''}</td>
            <td>${it.qty}</td>
            <td>${cur}${(it.price||0).toFixed(2)}</td>
            <td>${it.taxPct||0}%</td>
            <td style="font-weight:700">${cur}${(it.total||0).toFixed(2)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="totals-block">
      <div class="totals-inner">
        <div class="t-row"><span>Subtotal</span><span>${cur}${(inv.subtotal||0).toFixed(2)}</span></div>
        <div class="t-row"><span>ITBIS (18%)</span><span>${cur}${(inv.tax||0).toFixed(2)}</span></div>
        ${inv.discount?`<div class="t-row"><span>Descuento</span><span>-${cur}${(inv.discount||0).toFixed(2)}</span></div>`:''}
        <div class="t-row grand"><span>TOTAL</span><span>${cur}${(inv.total||0).toFixed(2)}</span></div>
      </div>
    </div>

    <div class="qr-block">
      <div id="doc-qr"></div>
      <div class="qr-label">Código QR de Verificación</div>
    </div>
    `;

    return html;
  }

  function renderNotFound(num){
    document.getElementById('verify-content').innerHTML = `
      <div class="not-found">
        <div class="nf-icon">&#10060;</div>
        <h2>Factura No Encontrada</h2>
        <p>No se encontró ninguna factura con el número <strong>${num||'especificado'}</strong> en este sistema.</p>
        <p style="margin-top:8px;font-size:13px;color:#aaa">Si cree que esto es un error, contacte a HYPERTECH SOLUTIONS.</p>
      </div>`;
  }

  // Main logic
  const invNum = getParam('inv');
  const invData = getParam('data');

  if(invData){
    // Data passed directly in QR URL (base64 encoded JSON)
    try{
      const decoded = JSON.parse(atob(decodeURIComponent(invData)));
      document.getElementById('verify-content').innerHTML = buildVerifyHTML(decoded);
      setTimeout(()=>{
        const qrEl = document.getElementById('doc-qr');
        if(qrEl){
          new QRCode(qrEl,{text:window.location.href,width:100,height:100,colorDark:'#1A1A1A',colorLight:'#ffffff'});
        }
      },200);
    }catch(e){
      renderNotFound(invNum);
    }
  } else if(invNum){
    // Try to find in localStorage (same-origin)
    try{
      const invoices = JSON.parse(localStorage.getItem('ht_invoices')||'[]');
      const inv = invoices.find(i=>i.number===invNum);
      if(inv){
        document.getElementById('verify-content').innerHTML = buildVerifyHTML(inv);
        setTimeout(()=>{
          const qrEl = document.getElementById('doc-qr');
          if(qrEl){
            new QRCode(qrEl,{text:window.location.href,width:100,height:100,colorDark:'#1A1A1A',colorLight:'#ffffff'});
          }
        },200);
      } else {
        renderNotFound(invNum);
      }
    }catch(e){
      renderNotFound(invNum);
    }
  } else {
    document.getElementById('verify-content').innerHTML = `
      <div class="not-found">
        <div class="nf-icon">&#128203;</div>
        <h2>Portal de Verificación DGII</h2>
        <p>Escanee el código QR de una factura de HYPERTECH SOLUTIONS para ver sus datos fiscales.</p>
        <p style="margin-top:8px;font-size:13px;color:#aaa">O acceda con el parámetro <code>?inv=INV-XXXXX</code></p>
      </div>`;
  }
</script>
</body>
</html>
